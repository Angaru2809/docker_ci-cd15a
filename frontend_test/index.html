<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Frontend Spring Boot</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 50%, #4a90c2 100%);
            font-family: Arial, sans-serif;
            color: #f5f5f5;
        }

        .contenedor {
            max-width: 700px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        h1, h2 {
            color: #ffffff;
        }

        button {
            background: #ffffff;
            color: #1e3a5f;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #e8f4fc;
        }

        input {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="contenedor">
    <h1>Consumo API Spring Boot</h1>

    <h2>Saludar</h2>
    <button onclick="saludar()">Probar /saludar</button>
    <p id="resultadoSaludo"></p>

    <h2>Sumar dos números</h2>
    <input type="number" id="numero1" placeholder="Número 1">
    <input type="number" id="numero2" placeholder="Número 2">
    <button onclick="sumar()">Sumar</button>
    <p id="resultadoSuma"></p>

    <h2>Prueba CI/CD</h2>
    <button onclick="testCi()">Probar /test_ci</button>
    <p id="resultadoTestCi"></p>

    <h2>Prueba despliegue continuo</h2>
    <button onclick="prueba()">Probar /prueba</button>
    <p id="resultadoPrueba"></p>

    <h2>Lista desde base de datos</h2>
    <button onclick="listar()">Consultar /lista</button>
    <ul id="listaDatos"></ul>
    </div>

    <script>
        const API_URL = "http://localhost:8091";

        function saludar() {
            fetch(`${API_URL}/saludar`)
                .then(response => response.text())
                .then(data => {
                    document.getElementById("resultadoSaludo").innerText = data;
                })
                .catch(error => {
                    document.getElementById("resultadoSaludo").innerText = "Error al consumir /saludar";
                    console.error(error);
                });
        }

        function sumar() {
            const numero1 = document.getElementById("numero1").value;
            const numero2 = document.getElementById("numero2").value;

            fetch(`${API_URL}/sumar?numero1=${numero1}&numero2=${numero2}`)
                .then(response => response.text())
                .then(data => {
                    document.getElementById("resultadoSuma").innerText = "Resultado: " + data;
                })
                .catch(error => {
                    document.getElementById("resultadoSuma").innerText = "Error al consumir /sumar";
                    console.error(error);
                });
        }

        function prueba() {
            fetch(`${API_URL}/prueba`)
                .then(response => response.text())
                .then(data => {
                    document.getElementById("resultadoPrueba").innerText = data;
                })
                .catch(error => {
                    document.getElementById("resultadoPrueba").innerText = "Error al consumir /prueba";
                    console.error(error);
                });
        }

        function testCi() {
            fetch(`${API_URL}/test_ci`)
                .then(response => response.text())
                .then(data => {
                    document.getElementById("resultadoTestCi").innerText = data;
                })
                .catch(error => {
                    document.getElementById("resultadoTestCi").innerText = "Error al consumir /test_ci";
                    console.error(error);
                });
        }

        function listar() {
            fetch(`${API_URL}/lista`)
                .then(response => response.json())
                .then(data => {
                    const lista = document.getElementById("listaDatos");
                    lista.innerHTML = "";

                    data.forEach(item => {
                        const li = document.createElement("li");
                        li.textContent = JSON.stringify(item);
                        lista.appendChild(li);
                    });
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById("listaDatos").innerHTML = "<li>Error al consumir /lista</li>";
                });
        }
    </script>

</body>
</html>
